server:
  port: 8081
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog_api?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
#Redis配置依赖
#连接池配置
  data:
    redis:
      host: localhost
      port: 6379
      password:          # 没设密码就留空
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0